version: "3.9"

services:
    db:
        image: postgres:16-alpine
        container_name: marketplace_db
        environment:
            POSTGRES_DB: marketplace
            POSTGRES_USER: app
            POSTGRES_PASSWORD: secret
        ports:
            - "5433:5432"
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U app -d marketplace"]
            interval: 5s
            timeout: 5s
            retries: 10
    migrate:
        image: migrate/migrate
        depends_on:
            db:
                condition: service_healthy
        volumes:
            - ./migrations/:/migrations
        command:
            [
                "-path",
                "/migrations/",
                "-database",
                "postgres://app:secret@db:5432/marketplace?sslmode=disable",
                "up",
            ]
    seeder:
        environment:
            DATABASE_URL: postgres://app:secret@db:5432/marketplace?sslmode=disable
        build:
            context: seeder
            dockerfile: Dockerfile
        depends_on:
            db:
                condition: service_healthy
            migrate:
                condition: service_completed_successfully
        volumes:
            - ./seeder/data/:/app/data
        command: ["node", "index.js"]

    backend:
        environment:
            DATABASE_URL: postgres://app:secret@db:5432/marketplace?sslmode=disable
            PORT: 4000
        ports:
            - 4000:4000
        build:
            context: backend
            dockerfile: Dockerfile
        depends_on:
            db:
                condition: service_healthy
            migrate:
                condition: service_completed_successfully
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "wget -qO- http://localhost:4000/health || exit 1",
                ]
            interval: 10s
            timeout: 5s
            retries: 5
    frontend:
        environment:
            API_URL: http://backend:4000
            NEXT_PUBLIC_API_URL: http://localhost:4000
        ports:
            - 3000:3000
        build:
            context: frontend
            dockerfile: Dockerfile
        depends_on:
            backend:
                condition: service_healthy
volumes:
    pgdata:
