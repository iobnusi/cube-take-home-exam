# docker-compose.yml
version: "3.9"

services:
    db:
        image: postgres:16-alpine
        container_name: marketplace_db
        environment:
            POSTGRES_DB: marketplace
            POSTGRES_USER: app
            POSTGRES_PASSWORD: secret
        ports:
            - "5433:5432"
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U app -d marketplace"]
            interval: 5s
            timeout: 5s
            retries: 10

volumes:
    pgdata:
